name: Weekly Product Review Pulse

on:
  schedule:
    # Runs at 04:00 UTC (9:30 AM IST) every Monday
    - cron: '0 4 * * 1'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI
permissions:
  contents: write

jobs:
  run-pulse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.7.1/en_core_web_sm-3.7.1-py3-none-any.whl

      - name: Install Playwright Browsers
        run: playwright install chromium

      - name: Reconstruct Sensitive Files
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "$CONFIG_YAML" > config.yaml
          echo "$GOOGLE_CREDENTIALS_JSON" > MCP_Server/credentials.json
          echo "$GOOGLE_TOKEN_JSON" > MCP_Server/token.json
          echo "GROQ_API_KEY=$GROQ_API_KEY" >> .env
          echo "PULSE_DB_PATH=pulse.db" >> .env
          echo "PULSE_CONFIG_PATH=config.yaml" >> .env
          echo "MCP_SERVER_URL=http://localhost:8000/sse" >> .env

      - name: Start Local MCP Server
        run: |
          # Run the MCP server in the background
          cd MCP_Server
          python google_mcp_servers.py &
          # Give it a few seconds to start
          sleep 5
          cd ..

      - name: Run Pulse Pipeline
        env:
          PYTHONPATH: "phases/phase0-foundations;phases/phase1-ingestion-storage;phases/phase2-reasoning;phases/phase3-mcp-delivery;phases/phase4-idempotency"
        run: |
          export PYTHONPATH="phases/phase0-foundations:phases/phase1-ingestion-storage:phases/phase2-reasoning:phases/phase3-mcp-delivery:phases/phase4-idempotency"
          python run_pulse.py --product groww

      - name: Commit and Push Database Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f pulse.db
          git commit -m "chore: Update pulse.db after weekly run [skip ci]" || echo "No changes to commit"
          git push
